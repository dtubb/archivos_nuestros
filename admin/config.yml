# Run "npx decap-server" for local backend
local_backend: true

backend:
  name: github
  repo: dtubb/archivos_nuestros
  branch: main
  base_url: https://archivosconvida.netlify.app
  auth_endpoint: .netlify/functions/auth
# This line should *not* be indented
media_folder: "assets/media" # Media files will be stored in the repo under images/uploads  

editor:
  preview: false

# publish_mode: editorial_workflow
collections:
  - name: "archive" # Used in routes, e.g., /admin/collections/blog
    label: "Primary Sources" # Used in the UI
    folder: "archives" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # Canonical site record data lives in Markdown/YAML front matter edited here.
      - { label: "Title (Spanish)", name: "title", widget: "string"}
      - { label: "Title (English)", name: "titleEng", widget: "string", required: false }
      - { label: "Short title (thin display title)", name: "shortTitle", widget: "string", required: false }
      - { label: "Sigla / Shorthand", name: "shorthand", widget: "string", required: false }
      - label: "Themes"
        name: "themes"
        widget: "list"
        required: false
        field: { label: "Theme", name: "theme", widget: "string" }
      - { label: "Author", name: "author", widget: "string", required: false }
      - label: "Topics"
        name: "topics"
        widget: "list"
        required: false
        field: { label: "Topic", name: "topic", widget: "string" }
      - { label: "Section (primary/secondary/publication)", name: "section", widget: "select", options: ["archival-primary", "research-library", "project-publications"], required: false }
      - { label: "Source / provenance — not the hosting link", name: "source", widget: "string", required: false }
      - { label: "Order", name: "order", widget: "number", required: false }
      - label: "Roles"
        name: "roles"
        widget: "list"
        required: false
        fields:
          - { label: "Role", name: "role", widget: "select", options: ["curator", "creator_author", "rights_holder", "editor", "translator", "transcriber", "contributor"] }
          - { label: "Name", name: "name", widget: "string" }
      - { label: "Type", name: "type", widget: "select", options: ["fotos", "documentos", "mapas", "entrevistas", "audiovisuales", "link", "other"], required: false }
      - { label: "Date (free text — ranges ok, e.g. 1930–1980)", name: "date", widget: "string", required: false }
      - { label: "Access", name: "access", widget: "select", options: ["público", "permiso", "restringido"], required: false }
      - { label: "Contact (for permission)", name: "contact", widget: "string", required: false }
      - { label: "Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Link", name: "link", widget: "string", required: false }
      - { label: "Citation key", name: "citationKey", widget: "string", required: false }
      - { label: "BibTeX", name: "bibtex", widget: "text", required: false }
      - { label: "Photo grid data key", name: "photoGrid", widget: "string", required: false }
      - { label: "Resumen breve (ES)", name: "summary-es", widget: "string", required: false }
      - { label: "Brief summary (EN)", name: "summary-en", widget: "string", required: false }
      - { label: "Description (Spanish)", name: "desc-es", widget: "markdown", required: false }
      - { label: "Description (English)", name: "desc-en", widget: "markdown", required: false }
      - { label: "Origen del texto descriptivo", name: "desc-origin", widget: "select", options: ["human", "ai", "ai-reviewed"], default: "human", required: false }
      - { label: "Catálogo (español)", name: "catalogue-es", widget: "markdown", required: false }
      - { label: "Catalogue (English)", name: "catalogue-en", widget: "markdown", required: false }
      - { label: "Origen del catálogo", name: "catalogue-origin", widget: "select", options: ["human", "ai", "ai-reviewed"], default: "human", required: false }
      - { label: "Transcripción (español)", name: "transcription-es", widget: "markdown", required: false }
      - { label: "Transcription (English)", name: "transcription-en", widget: "markdown", required: false }
      - { label: "Origen de la transcripción", name: "transcription-origin", widget: "select", options: ["human", "ai", "ai-reviewed"], default: "human", required: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  - name: "exhibit" # Used in routes, e.g., /admin/collections/blog
    label: "Project Publications" # Used in the UI
    folder: "exhibits" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - { label: "Title (Spanish)", name: "title", widget: "string"}
      - { label: "Title (English)", name: "titleEng", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Topic", name: "topic", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Link", name: "link", widget: "string", required: false }
      - { label: "Description (Spanish)", name: "desc-es", widget: "markdown", required: false }
      - { label: "Description (English)", name: "desc-en", widget: "markdown", required: false }

  - name: "settings"
    label: "Sitio"
    files:
      - name: "site"
        label: "Configuración del sitio (pie de página, hero)"
        file: "_data/site.yml"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Subtítulo (español)", name: "subtitle_es", widget: "text" }
              - { label: "Subtítulo (inglés)", name: "subtitle_en", widget: "text" }
          - label: "Convocantes / Conveners"
            name: "conveners"
            widget: "list"
            field: { label: "Persona", name: "person", widget: "string" }
          - label: "Curadores / Curators"
            name: "curators"
            widget: "list"
            field: { label: "Persona", name: "person", widget: "string" }
          - label: "Agradecimientos especiales / Special thanks"
            name: "special_thanks"
            widget: "list"
            field: { label: "Persona", name: "person", widget: "string" }
          - { label: "Intro apoyo (ES)", name: "funders_intro_es", widget: "text" }
          - { label: "Intro apoyo (EN)", name: "funders_intro_en", widget: "text" }
          - label: "Apoyo financiero / Financial support"
            name: "funders"
            widget: "list"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string", required: false }
      - name: "personas_es"
        label: "Personas (español)"
        file: "personas.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "prose.njk" }
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Contenido (markdown)", name: "body", widget: "markdown" }
      - name: "personas_en"
        label: "People (English)"
        file: "en/personas.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "prose.njk" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body (markdown)", name: "body", widget: "markdown" }
      - name: "colecciones"
        label: "Colecciones (portada + páginas de colección)"
        file: "_data/colecciones.yml"
        fields:
          - label: "Colecciones"
            name: "colecciones"
            widget: "list"
            fields:
              - { label: "Slug (URL)", name: "slug", widget: "string" }
              - { label: "Nombre (español)", name: "name_es", widget: "string" }
              - { label: "Name (English)", name: "name_en", widget: "string" }
              - { label: "Imagen de portada", name: "image", widget: "image", required: false }
              - { label: "Mapa", name: "map", widget: "image", required: false }
              - label: "Curaduría / Curators"
                name: "curators"
                widget: "list"
                required: false
                field: { label: "Persona", name: "person", widget: "string" }
              - { label: "Descripción (español)", name: "description_es", widget: "text", required: false }
              - { label: "Description (English)", name: "description_en", widget: "text", required: false }
